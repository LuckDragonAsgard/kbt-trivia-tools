<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundMash - KBT Question Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Bowlby+One+SC&family=Luckiest+Guy&family=Londrina+Solid:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            color: #333;
            font-family: 'Londrina Solid', cursive;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.95;
        }

        /* Upload Zone */
        .upload-section {
            background: #252545;
            border: 2px dashed #ea580c;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .upload-section:hover {
            border-color: #3a95ad;
            background: #2a2a50;
        }

        .upload-section.dragover {
            background: rgba(71, 181, 208, 0.1);
            border-color: #ea580c;
            transform: scale(1.02);
        }

        #fileInput {
            display: none;
        }

        .upload-text {
            font-size: 1.3em;
            margin-bottom: 15px;
        }

        .upload-hint {
            font-size: 0.95em;
            opacity: 0.7;
            margin-top: 10px;
        }

        /* Clips Section */
        .clips-section {
            margin-bottom: 30px;
        }

        .clips-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #ea580c;
        }

        .clips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .clip-card {
            background: #252545;
            border: 2px solid #ea580c;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .clip-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(71, 181, 208, 0.3);
        }

        .clip-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .clip-number {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.5em;
            color: #ea580c;
        }

        .clip-delete {
            background: rgba(255, 87, 87, 0.8);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Londrina Solid', cursive;
            transition: all 0.3s ease;
        }

        .clip-delete:hover {
            background: rgba(255, 87, 87, 1);
            transform: scale(1.05);
        }

        .waveform-container {
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
            height: 120px;
        }

        .waveform-canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: col-resize;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 0.9em;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            background: #f5f5f5;
            border: 1px solid #ea580c;
            border-radius: 6px;
            color: #333;
            font-family: 'Londrina Solid', cursive;
            font-size: 0.95em;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #3a95ad;
            box-shadow: 0 0 10px rgba(71, 181, 208, 0.3);
        }

        .trim-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        /* Mode Selector */
        .mode-section {
            background: #252545;
            border: 2px solid #ea580c;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .mode-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #ea580c;
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .mode-btn {
            padding: 15px;
            border: 2px solid #ea580c;
            background: transparent;
            color: #333;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Londrina Solid', cursive;
            font-size: 1em;
            transition: all 0.3s ease;
            text-align: center;
        }

        .mode-btn:hover {
            background: rgba(71, 181, 208, 0.1);
            transform: scale(1.05);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
            border-color: #333;
            font-weight: 700;
        }

        .mode-description {
            font-size: 0.85em;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Action Buttons */
        .action-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-family: 'Londrina Solid', cursive;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
            color: #333;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(71, 181, 208, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Results Section */
        .results-section {
            background: #252545;
            border: 2px solid #ea580c;
            border-radius: 12px;
            padding: 25px;
            margin-top: 30px;
            display: none;
        }

        .results-section.show {
            display: block;
        }

        .results-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.8em;
            margin-bottom: 25px;
            color: #ea580c;
        }

        .audio-player {
            margin-bottom: 30px;
        }

        .player-label {
            font-size: 1.1em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        audio {
            width: 100%;
            margin-bottom: 15px;
        }

        .preview-btn {
            background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Londrina Solid', cursive;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .preview-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(71, 181, 208, 0.3);
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
            margin-top: 25px;
        }

        .image-container {
            background: #f5f5f5;
            border: 1px solid #ea580c;
            border-radius: 8px;
            overflow: hidden;
        }

        .image-label {
            background: rgba(71, 181, 208, 0.2);
            padding: 10px;
            text-align: center;
            font-weight: 700;
            border-bottom: 1px solid #ea580c;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .download-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .btn-download {
            background: rgba(71, 181, 208, 0.2);
            border: 2px solid #ea580c;
            color: #333;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Londrina Solid', cursive;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        .btn-download:hover {
            background: rgba(71, 181, 208, 0.4);
            transform: translateY(-2px);
        }

        /* Loading Spinner */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(71, 181, 208, 0.3);
            border-radius: 50%;
            border-top-color: #ea580c;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 87, 87, 0.1);
            border: 2px solid rgba(255, 87, 87, 0.5);
            color: #ff5757;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: rgba(76, 175, 80, 0.1);
            border: 2px solid rgba(76, 175, 80, 0.5);
            color: #4caf50;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success.show {
            display: block;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .clips-grid {
                grid-template-columns: 1fr;
            }

            .action-section {
                grid-template-columns: 1fr;
            }

            .images-grid {
                grid-template-columns: 1fr;
            }

            .mode-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 SoundMash</h1>
            <p class="subtitle">Upload songs → Trim & mash → Get audio + slides</p>
        </header>

        <div class="error" id="errorMessage"></div>
        <div class="success" id="successMessage"></div>

        <!-- Upload Zone -->
        <div class="upload-section" id="uploadZone">
            <div class="upload-text">📁 Drop audio files here or click to upload</div>
            <div class="upload-hint">Support: MP3, WAV, OGG (2-5 files)</div>
        </div>
        <input type="file" id="fileInput" accept="audio/*" multiple>

        <!-- Clips Section -->
        <div class="clips-section" id="clipsSection" style="display: none;">
            <div class="clips-title">Your Clips</div>
            <div class="clips-grid" id="clipsGrid"></div>
        </div>

        <!-- Mode Selector -->
        <div class="mode-section" id="modeSection" style="display: none;">
            <div class="mode-title">Mashup Mode</div>
            <div class="mode-buttons" id="modeButtons">
                <button class="mode-btn active" data-mode="sequential">
                    Sequential
                    <div class="mode-description">One after another</div>
                </button>
                <button class="mode-btn" data-mode="overlay">
                    Overlay
                    <div class="mode-description">All layered</div>
                </button>
                <button class="mode-btn" data-mode="quickfire">
                    Quick Fire
                    <div class="mode-description">3-5 sec snippets</div>
                </button>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-section" id="actionSection" style="display: none;">
            <button class="btn btn-primary" id="previewBtn">🎧 Preview Mashup</button>
            <button class="btn btn-primary" id="generateBtn">✨ Generate Slides</button>
        </div>

        <!-- Results Section -->
        <div class="results-section" id="resultsSection">
            <div class="results-title">Your SoundMash</div>

            <div class="audio-player">
                <div class="player-label">Mashup Audio</div>
                <audio id="audioPlayer" controls></audio>
                <button class="preview-btn" id="playBtn">▶ Play Mashup</button>
            </div>

            <div class="images-grid">
                <div class="image-container">
                    <div class="image-label">Question Slide</div>
                    <canvas id="questionCanvas" width="1920" height="1080"></canvas>
                </div>
                <div class="image-container">
                    <div class="image-label">Answer Slide</div>
                    <canvas id="answerCanvas" width="1920" height="1080"></canvas>
                </div>
            </div>

            <div class="download-buttons">
                <button class="btn-download" id="downloadAudio">📥 Download Audio (WAV)</button>
                <button class="btn-download" id="downloadQuestion">📥 Download Question</button>
                <button class="btn-download" id="downloadAnswer">📥 Download Answer</button>
            </div>
        </div>
    </div>

    <script>
        // Global state
        const state = {
            clips: [],
            audioContext: null,
            mode: 'sequential',
            mashupBuffer: null,
            selectedClip: null
        };

        // Preload canvas fonts (Bowlby + Inter) so ctx.font renders correctly
        function loadFontsForCanvas() {
            const fonts = [
                new FontFace('Bowlby One SC', 'url(https://fonts.gstatic.com/s/bowlbyonesc/v22/DtVlJxerQqQm37tzN3wMug9Pzgj8owhNjuE.woff2)', {weight: '400'}),
                new FontFace('Inter', 'url(https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hiJ-Ek-_EeA.woff2)', {weight: '400'}),
                new FontFace('Inter', 'url(https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuI6fAZ9hiJ-Ek-_EeA.woff2)', {weight: '700'}),
            ];
            fonts.forEach(f => f.load().then(loaded => document.fonts.add(loaded)).catch(() => {}));
        }

        // Initialize
        function init() {
            state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            setupEventListeners();
            loadFontsForCanvas();
        }

        function setupEventListeners() {
            // Upload zone
            const uploadZone = document.getElementById('uploadZone');
            uploadZone.addEventListener('click', () => document.getElementById('fileInput').click());
            uploadZone.addEventListener('dragover', handleDragOver);
            uploadZone.addEventListener('dragleave', handleDragLeave);
            uploadZone.addEventListener('drop', handleDrop);

            document.getElementById('fileInput').addEventListener('change', handleFileSelect);

            // Mode buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.mode = btn.dataset.mode;
                });
            });

            // Action buttons
            document.getElementById('previewBtn').addEventListener('click', previewMashup);
            document.getElementById('generateBtn').addEventListener('click', generateSlides);
            document.getElementById('playBtn').addEventListener('click', playMashup);

            // Download buttons
            document.getElementById('downloadAudio').addEventListener('click', downloadAudio);
            document.getElementById('downloadQuestion').addEventListener('click', downloadQuestion);
            document.getElementById('downloadAnswer').addEventListener('click', downloadAnswer);
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById('uploadZone').classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            document.getElementById('uploadZone').classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById('uploadZone').classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('audio/'));
            processFiles(files);
        }

        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            processFiles(files);
        }

        async function processFiles(files) {
            if (state.clips.length + files.length > 5) {
                showError('Maximum 5 clips allowed');
                return;
            }

            showSuccess(`Processing ${files.length} file(s)...`);

            for (const file of files) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const audioBuffer = await state.audioContext.decodeAudioData(arrayBuffer);

                    const clip = {
                        id: Math.random().toString(36).substr(2, 9),
                        name: file.name.replace(/\.[^/.]+$/, ''),
                        buffer: audioBuffer,
                        title: '',
                        artist: '',
                        startTime: 0,
                        endTime: audioBuffer.duration,
                        trimStart: 0,
                        trimEnd: 1
                    };

                    state.clips.push(clip);
                } catch (error) {
                    showError(`Failed to load ${file.name}: ${error.message}`);
                }
            }

            renderClips();
            updateUI();
        }

        function renderClips() {
            const clipsGrid = document.getElementById('clipsGrid');
            clipsGrid.innerHTML = '';

            state.clips.forEach((clip, index) => {
                const card = document.createElement('div');
                card.className = 'clip-card';
                card.innerHTML = `
                    <div class="clip-header">
                        <div class="clip-number">Song ${index + 1}</div>
                        <button class="clip-delete" onclick="deleteClip('${clip.id}')">Delete</button>
                    </div>

                    <div class="waveform-container" id="waveform-${clip.id}">
                        <canvas class="waveform-canvas" data-clip-id="${clip.id}" width="300" height="120"></canvas>
                    </div>

                    <div class="form-group">
                        <label>Slide Label</label>
                        <input type="text" id="slideLabel" value="R1Q1" maxlength="10" oninput="drawQuestionSlide(); drawAnswerSlide();" />
                    </div>

                    <div class="form-group">
                        <label>Song Title</label>
                        <input type="text" placeholder="e.g., Bohemian Rhapsody"
                               value="${clip.title}"
                               onchange="updateClip('${clip.id}', 'title', this.value)">
                    </div>

                    <div class="form-group">
                        <label>Artist Name</label>
                        <input type="text" placeholder="e.g., Queen"
                               value="${clip.artist}"
                               onchange="updateClip('${clip.id}', 'artist', this.value)">
                    </div>

                    <div class="trim-inputs">
                        <div class="form-group">
                            <label>Start (s)</label>
                            <input type="number" step="0.1" min="0"
                                   value="${clip.trimStart.toFixed(1)}"
                                   onchange="updateClip('${clip.id}', 'trimStart', parseFloat(this.value))">
                        </div>
                        <div class="form-group">
                            <label>End (s)</label>
                            <input type="number" step="0.1" min="0"
                                   value="${clip.trimEnd.toFixed(1)}"
                                   onchange="updateClip('${clip.id}', 'trimEnd', parseFloat(this.value))">
                        </div>
                    </div>
                `;

                clipsGrid.appendChild(card);

                // Draw waveform
                setTimeout(() => drawWaveform(clip), 0);
            });
        }

        function drawWaveform(clip) {
            const canvas = document.querySelector(`canvas[data-clip-id="${clip.id}"]`);
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const data = clip.buffer.getChannelData(0);
            const step = Math.ceil(data.length / canvas.width);
            const amp = canvas.height / 2;

            // Background
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw waveform
            ctx.strokeStyle = '#ea580c';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, amp);

            for (let i = 0; i < canvas.width; i++) {
                let min = 1, max = -1;
                for (let j = 0; j < step; j++) {
                    const datum = data[i * step + j];
                    if (datum < min) min = datum;
                    if (datum > max) max = datum;
                }
                const y = amp + max * amp;
                ctx.lineTo(i, y);
            }
            ctx.stroke();

            ctx.beginPath();
            for (let i = canvas.width - 1; i >= 0; i--) {
                let min = 1, max = -1;
                for (let j = 0; j < step; j++) {
                    const datum = data[i * step + j];
                    if (datum < min) min = datum;
                    if (datum > max) max = datum;
                }
                const y = amp + min * amp;
                ctx.lineTo(i, y);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(71, 181, 208, 0.3)';
            ctx.fill();

            // Trim region highlight
            const duration = clip.buffer.duration;
            const startX = (clip.trimStart / duration) * canvas.width;
            const endX = (clip.trimEnd / duration) * canvas.width;

            ctx.fillStyle = 'rgba(71, 181, 208, 0.1)';
            ctx.fillRect(startX, 0, endX - startX, canvas.height);

            // Trim handles
            ctx.fillStyle = '#ea580c';
            ctx.fillRect(startX - 2, 0, 4, canvas.height);
            ctx.fillRect(endX - 2, 0, 4, canvas.height);
        }

        function updateClip(clipId, field, value) {
            const clip = state.clips.find(c => c.id === clipId);
            if (clip) {
                clip[field] = value;
                if (field.includes('trim')) {
                    drawWaveform(clip);
                }
            }
        }

        function deleteClip(clipId) {
            state.clips = state.clips.filter(c => c.id !== clipId);
            renderClips();
            updateUI();
        }

        function updateUI() {
            const hasClips = state.clips.length > 0;
            document.getElementById('clipsSection').style.display = hasClips ? 'block' : 'none';
            document.getElementById('modeSection').style.display = hasClips ? 'block' : 'none';
            document.getElementById('actionSection').style.display = hasClips ? 'block' : 'none';

            document.getElementById('previewBtn').disabled = state.clips.length < 2;
            document.getElementById('generateBtn').disabled = state.clips.length < 2 ||
                                                             state.clips.some(c => !c.title || !c.artist);
        }

        async function previewMashup() {
            try {
                showSuccess('Creating preview...');
                state.mashupBuffer = await createMashup();

                // Play the buffer
                playMashup();
                showSuccess('Preview ready!');
            } catch (error) {
                showError('Preview failed: ' + error.message);
            }
        }

        async function createMashup() {
            const clips = state.clips.filter(c => c.title && c.artist);
            if (clips.length < 2) throw new Error('Need at least 2 clips');

            let totalDuration = 0;
            const clipDurations = [];

            if (state.mode === 'sequential') {
                for (const clip of clips) {
                    const duration = (clip.trimEnd - clip.trimStart) * clip.buffer.duration;
                    clipDurations.push(duration);
                    totalDuration += duration + 0.2; // 200ms crossfade
                }
                totalDuration -= 0.2;
            } else if (state.mode === 'overlay') {
                for (const clip of clips) {
                    const duration = (clip.trimEnd - clip.trimStart) * clip.buffer.duration;
                    clipDurations.push(duration);
                    totalDuration = Math.max(totalDuration, duration);
                }
            } else if (state.mode === 'quickfire') {
                const snippetDuration = 4;
                for (const clip of clips) {
                    clipDurations.push(snippetDuration);
                    totalDuration += snippetDuration;
                }
            }

            const offlineCtx = new OfflineAudioContext(2, state.audioContext.sampleRate * totalDuration, state.audioContext.sampleRate);
            let currentTime = 0;

            for (let i = 0; i < clips.length; i++) {
                const clip = clips[i];
                const source = offlineCtx.createBufferSource();
                source.buffer = clip.buffer;

                const startSample = Math.floor(clip.trimStart * clip.buffer.duration * state.audioContext.sampleRate);
                const endSample = Math.floor(clip.trimEnd * clip.buffer.duration * state.audioContext.sampleRate);
                const duration = (endSample - startSample) / state.audioContext.sampleRate;

                if (state.mode === 'quickfire' && duration > 4) {
                    source.playbackRate.value = duration / 4;
                }

                source.connect(offlineCtx.destination);

                if (state.mode === 'overlay') {
                    source.start(0, clip.trimStart * clip.buffer.duration, duration);
                } else {
                    source.start(currentTime, clip.trimStart * clip.buffer.duration, duration);
                    currentTime += duration + 0.2;
                }
            }

            return await offlineCtx.startRendering();
        }

        function playMashup() {
            if (!state.mashupBuffer) return;

            const source = state.audioContext.createBufferSource();
            source.buffer = state.mashupBuffer;
            source.connect(state.audioContext.destination);
            source.start(0);
        }

        async function generateSlides() {
            try {
                showSuccess('Generating slides...');

                if (!state.mashupBuffer) {
                    state.mashupBuffer = await createMashup();
                }

                drawQuestionSlide();
                drawAnswerSlide();

                document.getElementById('resultsSection').classList.add('show');
                document.getElementById('audioPlayer').src = bufferToWavUrl(state.mashupBuffer);

                showSuccess('Slides ready!');
            } catch (error) {
                showError('Generation failed: ' + error.message);
            }
        }

        function drawKBTGrid(ctx, W, H) {
          ctx.save();
          ctx.strokeStyle = '#e4e4e4';
          ctx.lineWidth = 1;
          ctx.globalAlpha = 1;
          for (let x = 0; x <= W; x += 60) {
            ctx.beginPath(); ctx.moveTo(x+0.5, 0); ctx.lineTo(x+0.5, H); ctx.stroke();
          }
          for (let y = 0; y <= H; y += 60) {
            ctx.beginPath(); ctx.moveTo(0, y+0.5); ctx.lineTo(W, y+0.5); ctx.stroke();
          }
          ctx.restore();
        }
        function drawKBTPill(ctx, W, H, accent, toolName, slideLabel) {
          ctx.save();
          const label = slideLabel || 'R1Q1';
          ctx.font = 'bold 28px "Inter", sans-serif';
          const tw = ctx.measureText(label).width;
          const pw = tw + 36, ph = 44, px = 32, py = 24;
          // Draw pill
          ctx.fillStyle = accent;
          ctx.beginPath();
          ctx.arc(px + ph/2, py + ph/2, ph/2, Math.PI/2, 3*Math.PI/2);
          ctx.arc(px + pw - ph/2, py + ph/2, ph/2, -Math.PI/2, Math.PI/2);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#ffffff';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(label, px + pw/2, py + ph/2);
          // Tool name right
          ctx.font = 'bold 22px "Inter", sans-serif';
          ctx.fillStyle = accent;
          ctx.textAlign = 'right';
          ctx.textBaseline = 'middle';
          ctx.fillText(toolName, W - 36, py + ph/2);
          ctx.restore();
        }

        function drawQuestionSlide() {
            const canvas = document.getElementById('questionCanvas');
            const ctx = canvas.getContext('2d');

            // White background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid overlay
            drawKBTGrid(ctx, canvas.width, canvas.height);


            // Title
            ctx.font = 'bold 128px "Bowlby One SC", cursive';
            ctx.fillStyle = '#ea580c';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('SOUNDMASH', canvas.width / 2, 290);

            // Subtitle
            const validClips = state.clips.filter(c => c.title && c.artist).length;
            ctx.font = '400 42px "Inter", sans-serif';
            ctx.fillStyle = 'rgba(100,116,139,0.9)';
            ctx.fillText(`Name all ${validClips} songs`, canvas.width / 2, 400);

            // Decorative waveform bars
            drawWaveformBars(ctx, canvas.width, canvas.height);
        }

        function drawWaveformBars(ctx, width, height) {
            // Decorative animated waveform bars in lower half
            const barWidth = 8;
            const spacing = 18;
            const numBars = 48;
            const startX = (width - numBars * spacing) / 2;
            const centreY = height * 0.72;
            for (let i = 0; i < numBars; i++) {
                const x = startX + i * spacing;
                const barHeight = Math.abs(Math.sin(i / 4.5)) * 140 + 28;
                const alpha = 0.15 + 0.25 * (Math.abs(Math.sin(i / 4.5)));
                ctx.fillStyle = `rgba(234, 88, 12, ${alpha})`;
                ctx.fillRect(x, centreY - barHeight / 2, barWidth, barHeight);
            }

            const smLabel = document.getElementById(\'slideLabel\') ? document.getElementById(\'slideLabel\').value || \'R1Q1\' : \'R1Q1\';
            drawKBTPill(ctx, canvas.width, canvas.height, \'#ea580c\', \'SOUNDMASH\', smLabel);
        }
        function drawAnswerSlide() {
            const canvas = document.getElementById('answerCanvas');
            const ctx = canvas.getContext('2d');

            // White background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid overlay
            drawKBTGrid(ctx, canvas.width, canvas.height);

            ctx.fillStyle = '#ea580c';
            ctx.fillRect(0, 0, canvas.width, 7);

            // Title
            ctx.font = 'bold 104px "Bowlby One SC", cursive';
            ctx.fillStyle = '#ea580c';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('THE ANSWERS', canvas.width / 2, 100);

            // Answers list — 2 columns if > 4 clips
            const validClips = state.clips.filter(c => c.title && c.artist);
            const useTwoCols = validClips.length > 4;
            const colW = canvas.width / (useTwoCols ? 2 : 1);
            const xBase = useTwoCols ? 100 : 150;

            ctx.textAlign = 'left';
            let col = 0, row = 0;
            validClips.forEach((clip, i) => {
                if (useTwoCols && i === Math.ceil(validClips.length / 2)) { col = 1; row = 0; }
                const x = xBase + col * colW;
                const y = 290 + row * 160;
                ctx.font = 'bold 54px "Bowlby One SC", cursive';
                ctx.fillStyle = '#1a1a2e';
                ctx.textBaseline = 'top';
                ctx.fillText(`${i + 1}. ${clip.title}`, x, y);
                ctx.font = '400 38px "Inter", sans-serif';
                ctx.fillStyle = '#ea580c';
                ctx.fillText(`    ${clip.artist}`, x, y + 64);
                row++;
            });

            const smLabel = document.getElementById(\'slideLabel\') ? document.getElementById(\'slideLabel\').value || \'R1Q1\' : \'R1Q1\';
            drawKBTPill(ctx, canvas.width, canvas.height, \'#ea580c\', \'SOUNDMASH\', smLabel);
        }
        function bufferToWavUrl(audioBuffer) {
            const numberOfChannels = audioBuffer.numberOfChannels;
            const sampleRate = audioBuffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;

            const bytesPerSample = bitDepth / 8;
            const blockAlign = numberOfChannels * bytesPerSample;
            const wavDataByteLength = audioBuffer.length * blockAlign;
            const headerByteLength = 44;
            const totalLength = headerByteLength + wavDataByteLength;

            const arrayBuffer = new ArrayBuffer(totalLength);
            const view = new DataView(arrayBuffer);

            const channels = [];
            for (let i = 0; i < numberOfChannels; i++) {
                channels.push(audioBuffer.getChannelData(i));
            }

            // WAV header
            const setUint32 = (offset, value) => view.setUint32(offset, value, true);
            const setUint16 = (offset, value) => view.setUint16(offset, value, true);

            setUint32(0, 0x46464952); // "RIFF"
            setUint32(4, totalLength - 8);
            setUint32(8, 0x45564157); // "WAVE"
            setUint32(12, 0x20746d66); // "fmt "
            setUint32(16, 16); // subChunk1Size
            setUint16(20, format);
            setUint16(22, numberOfChannels);
            setUint32(24, sampleRate);
            setUint32(28, sampleRate * blockAlign);
            setUint16(32, blockAlign);
            setUint16(34, bitDepth);
            setUint32(36, 0x61746164); // "data"
            setUint32(40, wavDataByteLength);

            // PCM data
            let offset = headerByteLength;
            const volume = 0.8;
            for (let i = 0; i < audioBuffer.length; i++) {
                for (let channel = 0; channel < numberOfChannels; channel++) {
                    let sample = Math.max(-1, Math.min(1, channels[channel][i] * volume));
                    sample = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
                    view.setInt16(offset, sample, true);
                    offset += 2;
                }
            }

            return URL.createObjectURL(new Blob([arrayBuffer], { type: 'audio/wav' }));
        }
        function downloadAudio() {
            if (!state.mashupBuffer) return;
            const url = bufferToWavUrl(state.mashupBuffer);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'soundmash.wav';
            a.click();
            URL.revokeObjectURL(url);
        }

        function downloadQuestion() {
            const canvas = document.getElementById('questionCanvas');
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'soundmash-question.png';
                a.click();
                URL.revokeObjectURL(url);
            }, 'image/png');
        }

        function downloadAnswer() {
            const canvas = document.getElementById('answerCanvas');
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'soundmash-answer.png';
                a.click();
                URL.revokeObjectURL(url);
            }, 'image/png');
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        // Initialize on load
        window.addEventListener('load', init);
    </script>
