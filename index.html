<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Know Brainer Trivia — Trial Build. A standalone test environment for experimenting with the KBT platform.">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <title>KBT Trial - Know Brainer Trivia</title>
    <style>
        @font-face {
            font-family: "VVDS Fifties";
            src: url("https://knowbrainertrivia.com.au/fonts/VVDSFifties-SExpBold.woff2") format("woff2");
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(44,148,194,0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(44,148,194,0.08) 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
            z-index: 0;
        }
        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(3%, 3%) rotate(3deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 480px;
            width: 100%;
        }

        /* Logo animation */
        .logo {
            font-family: "VVDS Fifties", sans-serif;
            font-size: clamp(2.8rem, 10vw, 4.5rem);
            color: #2C94C2;
            text-align: center;
            line-height: 1;
            margin-bottom: 0.3rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease-out 0.2s forwards;
        }
        .trivia {
            font-family: "VVDS Fifties", sans-serif;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            color: #ffffff;
            text-align: center;
            margin-bottom: 0.3rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease-out 0.4s forwards;
        }
        .tagline {
            font-family: "VVDS Fifties", sans-serif;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            color: #ffffff;
            text-align: center;
            font-style: italic;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease-out 0.6s forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(44,148,194,0.15);
            border: 1px solid rgba(44,148,194,0.4);
            color: #2C94C2;
            padding: 0.4rem 1.2rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.8s forwards;
        }
        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #2C94C2;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Portal cards */
        .portals {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            width: 100%;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 1s forwards;
        }
        .portal-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #ffffff;
            text-decoration: none;
            padding: 1.1rem 1.5rem;
            border-radius: 16px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .portal-link:hover {
            background: rgba(44,148,194,0.12);
            border-color: rgba(44,148,194,0.3);
            transform: translateX(4px);
        }
        .portal-link:active {
            transform: scale(0.98);
        }
        .portal-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .portal-icon.player { background: rgba(44,148,194,0.2); }
        .portal-icon.host { background: rgba(232,163,23,0.2); }
        .portal-icon.admin { background: rgba(255,255,255,0.08); }

        .portal-info { flex: 1; }
        .portal-name {
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .portal-desc {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: 0.15rem;
        }
        .portal-arrow {
            font-size: 1.2rem;
            opacity: 0.3;
            transition: all 0.25s;
        }
        .portal-link:hover .portal-arrow {
            opacity: 0.8;
            transform: translateX(3px);
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 1.5rem 0;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 1.2s forwards;
        }

        /* Live site link */
        .live-link {
            opacity: 0;
            animation: fadeUp 0.8s ease-out 1.4s forwards;
            text-align: center;
        }
        .live-link a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .live-link a:hover { color: #2C94C2; }

        /* Footer */
        .footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            opacity: 0.25;
            text-align: center;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 1.6s forwards;
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            body { padding: 1.5rem; }
            .portal-link { padding: 1rem 1.2rem; }
        }
    </style>
    <script src="kbt-data.js"></script>
</head>
<body>
    <div class="container">
        <div class="logo">KNOW BRAINER</div>
        <div class="trivia">Trivia.</div>
        <div class="tagline">Trivia. But Better.</div>
        <div class="badge">Trial Build</div>

        <div class="portals">
            <a href="/player-app" class="portal-link">
                <div class="portal-icon player">🎮</div>
                <div class="portal-info">
                    <div class="portal-name">Player Portal</div>
                    <div class="portal-desc">Teams, scores, badges &amp; wrapped</div>
                </div>
                <div class="portal-arrow">›</div>
            </a>

            <a href="/host-app" class="portal-link">
                <div class="portal-icon host">🎤</div>
                <div class="portal-info">
                    <div class="portal-name">Host Portal</div>
                    <div class="portal-desc">Run trivia nights &amp; manage quizzes</div>
                </div>
                <div class="portal-arrow">›</div>
            </a>

            <a href="/admin-app" class="portal-link">
                <div class="portal-icon admin">⚙️</div>
                <div class="portal-info">
                    <div class="portal-name">Admin Portal</div>
                    <div class="portal-desc">Settings, venues, analytics &amp; config</div>
                </div>
                <div class="portal-arrow">›</div>
            </a>
        </div>

        <div class="divider"></div>

        <div class="live-link">
            <a href="https://knowbrainertrivia.com.au" target="_blank">
                View live site ↗
            </a>
        </div>

        <div class="footer">KBT Trial Build — Linked to Supabase (<span id="kbtLiveTarget">...</span>)</div>
        <script>
          (async function(){
            try {
              if (!window.kbtData) return;
              const ev = await window.kbtData.getEventByCode(window.kbtData.TARGET_EVENT_CODE);
              const el = document.getElementById('kbtLiveTarget');
              if (el && ev) el.textContent = ev.event_code + ' · ' + ev.event_description;
              else if (el) el.textContent = 'offline fallback';
            } catch(e) {
              const el = document.getElementById('kbtLiveTarget');
              if (el) el.textContent = 'offline (conn error)';
            }
          })();
        </script>
    </div>
</body>
</html>
