<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Know Brainer — Join the Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans+Condensed:wght@700;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--blue:#2c94c2;--yellow:#fbc500;--charcoal:#383737;--bg:#f8fafc}
body{font-family:'Outfit',sans-serif;background:var(--bg);min-height:100vh;color:var(--charcoal)}
.topbar{background:var(--charcoal);padding:14px 20px;display:flex;align-items:center;gap:10px}
.logo{font-family:'Fira Sans Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:1px;color:#fff;text-transform:uppercase}
.logo span{color:var(--yellow)}
.event-chip{background:var(--blue);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;margin-left:auto}
.screen{display:none;flex-direction:column;align-items:center;padding:32px 20px;max-width:420px;margin:0 auto}
.screen.active{display:flex}
/* Register screen */
.icon-big{font-size:56px;margin-bottom:16px}
h1{font-family:'Fira Sans Condensed',sans-serif;font-size:28px;font-weight:900;text-align:center;margin-bottom:8px}
.sub{font-size:14px;color:#666;text-align:center;margin-bottom:28px;line-height:1.5}
.input-group{width:100%;margin-bottom:16px}
.input-group label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#666;display:block;margin-bottom:6px}
.input-group input{width:100%;padding:14px 16px;border:2px solid #e5e7eb;border-radius:10px;font-size:16px;font-family:'Outfit',sans-serif;outline:none;transition:.15s;background:#fff}
.input-group input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(44,148,194,.1)}
.btn-main{width:100%;padding:16px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:.15s;margin-top:8px}
.btn-main:hover{background:var(--charcoal)}
.btn-main:active{transform:scale(.98)}
.btn-main:disabled{opacity:.5;cursor:not-allowed}
/* Emoji picker */
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;width:100%;margin-bottom:20px}
.emoji-btn{padding:10px;font-size:22px;background:#fff;border:2px solid #e5e7eb;border-radius:8px;cursor:pointer;text-align:center;transition:.1s}
.emoji-btn.selected{border-color:var(--blue);background:rgba(44,148,194,.08)}
/* Success screen */
.team-card{background:#fff;border-radius:16px;padding:28px;width:100%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:20px;border:2px solid var(--blue)}
.team-emoji-big{font-size:56px;margin-bottom:12px}
.team-name-big{font-family:'Fira Sans Condensed',sans-serif;font-size:32px;font-weight:900;color:var(--charcoal)}
.team-code{background:var(--bg);border-radius:8px;padding:10px;font-size:13px;color:#666;margin-top:12px}
.live-feed{width:100%}
.live-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:10px}
.team-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-radius:8px;margin-bottom:6px;border:1px solid #e5e7eb;font-size:14px}
.team-item .num{font-weight:700;color:var(--muted);width:20px;font-size:12px;color:#999}
.error-msg{background:#fee2e2;color:#dc2626;border-radius:8px;padding:12px;font-size:13px;width:100%;text-align:center;margin-bottom:12px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">KNOW<span>BRAINER</span></div>
  <div class="event-chip" id="event-chip">Loading…</div>
</div>

<!-- SCREEN 1: Register -->
<div class="screen active" id="screen-register">
  <div class="icon-big">🧠</div>
  <h1>Join Tonight's Quiz</h1>
  <p class="sub" id="event-desc">Enter your team details to get started.</p>

  <div id="error-msg" class="error-msg" style="display:none"></div>

  <div class="input-group">
    <label>Team Name</label>
    <input id="team-name" type="text" placeholder="e.g. The Quiztopher Walkens" maxlength="40" autocomplete="off">
  </div>
  <div class="input-group">
    <label>Your Name (Captain)</label>
    <input id="player-name" type="text" placeholder="First name" maxlength="30" autocomplete="off">
  </div>

  <div style="width:100%;margin-bottom:8px">
    <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#666;display:block;margin-bottom:10px">Pick a Team Emoji</label>
    <div class="emoji-grid" id="emoji-grid"></div>
  </div>

  <button class="btn-main" onclick="registerTeam()" id="reg-btn">Register Team →</button>
</div>

<!-- SCREEN 2: Registered! -->
<div class="screen" id="screen-success">
  <div class="team-card">
    <div class="team-emoji-big" id="success-emoji">🧠</div>
    <div class="team-name-big" id="success-name">Team Name</div>
    <div class="team-code">You're registered ✓ — quiz starts soon!</div>
  </div>

  <div class="live-feed">
    <div class="live-title">📋 Teams registered tonight</div>
    <div id="teams-list"></div>
  </div>
</div>

<script>
const SB = 'https://huvfgenbcaiicatvtxak.supabase.co/rest/v1';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1dmZnZW5iY2FpaWNhdHZ0eGFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MTczNjIsImV4cCI6MjA5MTE5MzM2Mn0.uTgzTKYjJnkFlRUIhGfW4ODKyV24xOdKaX7lxpDuMfc';
const H = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' };

const EMOJIS = ['🧠','🎯','🏆','🔥','⭐','🎸','🦁','🐻','🦊','🐧','🎩','🚀','💎','🍺','🎪','🦄','🌮','🏉','🎭','🎲','🦈','🐉','🌟','🎮'];
let selectedEmoji = '🧠';
let eventCode = '';

// Init
const params = new URLSearchParams(window.location.search);
eventCode = params.get('code') || localStorage.getItem('kbt_event_code') || '';
document.getElementById('event-chip').textContent = eventCode || 'No Event';

// Load event details
if (eventCode) {
  fetch(`${SB}/kbt_event?event_code=eq.${encodeURIComponent(eventCode)}&limit=1&select=event_description,event_date`, { headers: H })
    .then(r => r.json())
    .then(ev => {
      if (ev[0]) {
        const desc = ev[0].event_description || '';
        const date = ev[0].event_date ? new Date(ev[0].event_date).toLocaleDateString('en-AU', {weekday:'long',day:'numeric',month:'long'}) : '';
        document.getElementById('event-desc').textContent = `${date}${desc ? ' — ' + desc : ''}`;
      }
    });
}

// Emoji grid
document.getElementById('emoji-grid').innerHTML = EMOJIS.map(e =>
  `<button class="emoji-btn${e===selectedEmoji?' selected':''}" onclick="pickEmoji('${e}')">${e}</button>`
).join('');

function pickEmoji(e) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
  event.target.classList.add('selected');
}

async function registerTeam() {
  const name = document.getElementById('team-name').value.trim();
  const player = document.getElementById('player-name').value.trim();
  const err = document.getElementById('error-msg');
  err.style.display = 'none';

  if (!name) { err.textContent = 'Enter a team name'; err.style.display = 'block'; return; }
  if (!eventCode) { err.textContent = 'No event code — ask your host'; err.style.display = 'block'; return; }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Registering…';

  try {
    const r = await fetch(`${SB}/kbt_teams`, {
      method: 'POST',
      headers: { ...H, 'Prefer': 'return=representation' },
      body: JSON.stringify({
        event_code: eventCode,
        team_name: name,
        display_name: name,
        name: name,
        team_emoji: selectedEmoji,
        event_id: null,
      })
    });

    if (!r.ok) {
      const e = await r.json();
      throw new Error(e.message || 'Registration failed');
    }

    // Show success
    document.getElementById('success-emoji').textContent = selectedEmoji;
    document.getElementById('success-name').textContent = name;
    document.getElementById('screen-register').classList.remove('active');
    document.getElementById('screen-success').classList.add('active');
    localStorage.setItem('kbt_team_name', name);
    localStorage.setItem('kbt_team_emoji', selectedEmoji);

    // Load all teams for live feed
    loadTeamsList();
    setInterval(loadTeamsList, 10000);

  } catch(e) {
    err.textContent = e.message; err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Register Team →';
  }
}

async function loadTeamsList() {
  const r = await fetch(`${SB}/kbt_teams?event_code=eq.${encodeURIComponent(eventCode)}&order=created_at.asc&select=display_name,team_name,team_emoji`, { headers: H });
  const teams = await r.json();
  document.getElementById('teams-list').innerHTML = teams.map((t, i) =>
    `<div class="team-item"><span class="num">${i+1}</span><span>${t.team_emoji||'🧠'}</span><span>${t.display_name||t.team_name}</span></div>`
  ).join('') || '<div style="color:#999;font-size:13px;padding:8px">No teams yet — be first!</div>';
}
</script>
</body>
</html>
